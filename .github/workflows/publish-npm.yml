name: Publish to npm

on:
  release:
    types: [published]

jobs:
  # Gate: All tests must pass before publishing
  test:
    uses: ./.github/workflows/test.yml

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Publish to npm
        uses: JS-DevTools/npm-publish@v4
        with:
          token: ${{ secrets.NPM_TOKEN }}
          access: public
          ignore-scripts: true
