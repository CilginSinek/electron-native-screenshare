name: Publish to GitHub Packages

on:
  release:
    types: [published]

jobs:
  # Gate: All tests must pass before publishing
  test:
    uses: ./.github/workflows/test.yml

  publish-github:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --ignore-scripts

      # GitHub Packages requires a scoped package name
      - name: Set scoped package name for GitHub Packages
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@CilginSinek/electron-native-screenshare';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Publish to GitHub Packages
        uses: JS-DevTools/npm-publish@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          registry: https://npm.pkg.github.com
          access: public
          ignore-scripts: true
