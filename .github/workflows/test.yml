name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    # Allows publish workflows to call this as a prerequisite

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # WINDOWS — Full capture test with virtual audio device
  # ───────────────────────────────────────────────────────────────────────────
  test-windows:
    runs-on: windows-2022
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: npm install

      - name: Build native module
        run: npm run build

      # ── Virtual Audio Device Setup ──────────────────────────────────────────
      # GitHub Actions Windows runners have no physical audio output.
      # We install VB-CABLE (a virtual loopback driver) so WASAPI has a real
      # render endpoint to capture from.  After this step `startCapture` can
      # actually return data instead of E_UNEXPECTED / AUDCLNT_E_ENDPOINT_CREATE_FAILED.
      - name: Install VB-CABLE virtual audio driver
        shell: powershell
        run: |
          $installer = "$env:TEMP\VBCABLE_Setup_x64.exe"
          Invoke-WebRequest `
            -Uri "https://download.vb-audio.com/Download_CABLE/VBCABLE_Driver_Pack43.zip" `
            -OutFile "$env:TEMP\vbcable.zip"
          Expand-Archive "$env:TEMP\vbcable.zip" -DestinationPath "$env:TEMP\vbcable"
          # Silent install — requires elevated rights (runners are admin by default)
          Start-Process `
            -FilePath "$env:TEMP\vbcable\VBCABLE_Setup_x64.exe" `
            -ArgumentList "-si" `
            -Wait -Verb RunAs
          Write-Host "VB-CABLE installation triggered"

      - name: Wait for audio service to register new device
        shell: powershell
        run: |
          Start-Sleep -Seconds 5
          # Verify a render endpoint is now present
          $devices = Get-PnpDevice -Class "AudioEndpoint" -Status "OK" | Where-Object {
            $_.FriendlyName -like "*CABLE*" -or $_.FriendlyName -like "*VB-*"
          }
          if ($devices) {
            Write-Host "Virtual audio device found: $($devices[0].FriendlyName)"
          } else {
            Write-Warning "VB-CABLE device not detected — capture tests may be skipped"
          }

      - name: Play sine wave into virtual device (background)
        shell: powershell
        run: |
          # Install ffmpeg via Chocolatey (pre-installed on windows-2022 runners)
          # Pipe a 440 Hz sine wave to the default output for 30 seconds —
          # long enough to cover the full test run.
          Start-Process -NoNewWindow -FilePath "ffmpeg" -ArgumentList `
            "-f lavfi -i sine=frequency=440:duration=30 -f dshow -i audio=""CABLE Input (VB-Audio Virtual Cable)"" -ar 48000 -ac 2 -y NUL"
          # Fallback: use PowerShell MediaPlayer if ffmpeg fails
          try {
            Add-Type -AssemblyName presentationCore
            $player = New-Object system.windows.media.mediaplayer
            # Generate a tiny WAV in memory and play it in a loop — not needed if ffmpeg worked
          } catch {}
          Write-Host "Sine wave playback started"

      - name: Set VIRTUAL_AUDIO_READY flag and run tests
        shell: powershell
        env:
          VIRTUAL_AUDIO_READY: "1"
        run: npm test

  # ───────────────────────────────────────────────────────────────────────────
  # MACOS — ScreenCaptureKit capture test
  # macOS 14 (Sonoma) runners have a CoreAudio null device available.
  # ScreenCaptureKit does NOT require a physical mic/speaker for process loopback.
  # ───────────────────────────────────────────────────────────────────────────
  test-macos:
    runs-on: macos-14  # Apple Silicon — macOS 14 Sonoma (ScreenCaptureKit 13+)
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build native module
        run: npm run build

      - name: Enable built-in macOS null audio device
        run: |
          # The "BlackHole" virtual audio driver or the built-in CoreAudio null device
          # allows ScreenCaptureKit to initialise without a physical speaker.
          # Install BlackHole-2ch via Homebrew (no UI dialogs, no SIP bypass required).
          brew install blackhole-2ch || true
          # Allow a moment for the audio server to pick up the new device
          sleep 3
          # Verify: list CoreAudio devices
          system_profiler SPAudioDataType | grep -i "blackhole\|null\|virtual" || \
            echo "No virtual device found — SCK capture tests will be gracefully skipped"

      - name: Run tests
        # ScreenCaptureKit on macOS can capture process audio without a physical device
        # if a virtual device exists; we set the flag conservatively.
        env:
          VIRTUAL_AUDIO_READY: "1"
        run: npm test

  # ───────────────────────────────────────────────────────────────────────────
  # LINUX — PipeWire capture test with virtual sink
  # ───────────────────────────────────────────────────────────────────────────
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PipeWire, WirePlumber, and virtual sink tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libpipewire-0.3-dev \
            libx11-dev \
            pipewire \
            pipewire-audio-client-libraries \
            wireplumber \
            gstreamer1.0-pipewire \
            ffmpeg \
            pulseaudio-utils

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build native module
        run: npm run build

      - name: Start PipeWire daemon and virtual null sink
        # XDG_RUNTIME_DIR MUST be exported before pipewire starts so the daemon
        # creates its socket at the same path the client will look for it.
        # Without this, pw_context_connect() returns -3 (ENOENT — socket not found).
        run: |
          export XDG_RUNTIME_DIR=/tmp/pipewire-runtime
          mkdir -p $XDG_RUNTIME_DIR

          # Launch PipeWire daemon (headless — no physical hardware needed)
          pipewire &
          sleep 2

          # Verify the socket exists before proceeding
          if [ ! -S "$XDG_RUNTIME_DIR/pipewire-0" ]; then
            echo "ERROR: PipeWire socket not found at $XDG_RUNTIME_DIR/pipewire-0"
            ls -la $XDG_RUNTIME_DIR || true
            exit 1
          fi
          echo "PipeWire socket ready: $XDG_RUNTIME_DIR/pipewire-0"

          # pw-loopback creates a capture source backed by a null sink —
          # this is the correct way to get a readable audio stream without hardware.
          PIPEWIRE_REMOTE=$XDG_RUNTIME_DIR/pipewire-0 \
            pw-loopback --capture-props='media.class=Audio/Source node.name=null-source' &
          sleep 1

          # Feed a 440 Hz sine wave to PipeWire's default sink for 60 s
          # (covers the full Jest run including timeouts)
          PIPEWIRE_REMOTE=$XDG_RUNTIME_DIR/pipewire-0 \
            ffmpeg -f lavfi -i sine=frequency=440:duration=60 \
              -f pipewire -i default \
              -ar 48000 -ac 2 -y /dev/null 2>/dev/null &
          echo "Sine wave playback started"

      - name: Run tests
        env:
          VIRTUAL_AUDIO_READY: "1"
          XDG_RUNTIME_DIR: /tmp/pipewire-runtime
          PIPEWIRE_REMOTE: /tmp/pipewire-runtime/pipewire-0
        run: npm test

  # ───────────────────────────────────────────────────────────────────────────
  # LINUX NO-DEPS — Graceful degradation test
  #
  # Purpose: verify that the JS layer behaves correctly when the native
  # PipeWire/X11 dev packages are absent and the .node addon cannot be built.
  # Expected outcome:
  #   - isAvailable() → false
  #   - getLoadError() → descriptive string
  #   - All integration tests are skipped (not failed)
  #   - Pure JS tests (module exports, argument validation) all pass
  # ───────────────────────────────────────────────────────────────────────────
  test-linux-no-deps:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install JS dependencies only (skip native build)
        # --ignore-scripts prevents node-gyp rebuild from running automatically.
        # No libpipewire-0.3-dev or libx11-dev → the .node addon will not exist.
        run: npm install --ignore-scripts

      - name: Verify graceful degradation (isAvailable must be false)
        run: |
          node -e "
            const mod = require('./lib/index');
            if (mod.isAvailable()) {
              console.error('FAIL: isAvailable() returned true without a native build');
              process.exit(1);
            }
            const err = mod.getLoadError();
            if (!err || err.length === 0) {
              console.error('FAIL: getLoadError() is empty — missing descriptive error');
              process.exit(2);
            }
            console.log('OK: graceful degradation working. Error message preview:');
            console.log(err.substring(0, 120));
          "

      - name: Run tests (native unavailable — only JS-layer tests execute)
        # VIRTUAL_AUDIO_READY is intentionally NOT set so audio capture
        # tests are skipped instead of attempted.
        run: npm test
