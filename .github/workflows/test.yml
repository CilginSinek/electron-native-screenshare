name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    # Allows publish workflows to call this as a prerequisite

jobs:
  test-windows:
    runs-on: windows-2022
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: npm install

      - name: Build native module
        run: npm run build

      - name: Run tests
        run: npm test

  test-macos:
    runs-on: macos-14  # Apple Silicon, macOS 14 Sonoma
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build native module
        run: npm run build

      - name: Run tests
        run: npm test

  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PipeWire and X11 development libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libx11-dev pipewire

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build native module
        run: npm run build

      - name: Run tests
        run: npm test
