name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    # Allows publish workflows to call this as a prerequisite

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # WINDOWS — Full capture test with virtual audio device
  # ───────────────────────────────────────────────────────────────────────────
  test-windows:
    runs-on: windows-2022
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: npm install

      - name: Build native module
        run: npm run build

      # ── Virtual Audio Device Setup ──────────────────────────────────────────
      # GitHub Actions Windows runners have no physical audio output.
      # We install VB-CABLE via Chocolatey (pre-installed on all windows-* runners).
      # choco completes without requiring a reboot unlike the direct installer.
      - name: Install VB-CABLE virtual audio driver
        shell: powershell
        run: |
          choco install vb-cable -y --no-progress
          
          # GitHub Actions Windows runners have the Audio service disabled by default.
          # We must explicitly enable and start it so WASAPI can initialize.
          Set-Service -Name "AudioEndpointBuilder" -StartupType Automatic -ErrorAction SilentlyContinue
          Start-Service -Name "AudioEndpointBuilder" -ErrorAction SilentlyContinue
          Set-Service -Name "AudioSrv" -StartupType Automatic -ErrorAction SilentlyContinue
          Start-Service -Name "AudioSrv" -ErrorAction SilentlyContinue
          
          # Give the audio service time to enumerate the new device
          Start-Sleep -Seconds 8
          $devices = Get-PnpDevice -Class "AudioEndpoint" -Status "OK" -ErrorAction SilentlyContinue |
            Where-Object { $_.FriendlyName -like "*CABLE*" -or $_.FriendlyName -like "*VB-*" }
          if ($devices) {
            Write-Host "Virtual audio device ready: $($devices[0].FriendlyName)"
          } else {
            Write-Warning "VB-CABLE not detected -- audio capture tests will be skipped"
          }

      - name: Install ffmpeg and play sine wave into virtual device (background)
        shell: powershell
        run: |
          # ffmpeg is available via Chocolatey but NOT in PATH by default on windows-2022.
          choco install ffmpeg -y --no-progress | Out-Null
          
          # Generate a 120-second 440 Hz sine WAV file
          $wav = "$env:TEMP\sine440.wav"
          $ffmpeg = Get-Command ffmpeg -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          if (-not $ffmpeg) { $ffmpeg = "C:\ProgramData\chocolatey\bin\ffmpeg.exe" }
          
          # Start-Process with -Wait avoids NativeCommandError from ffmpeg's stderr
          Start-Process -FilePath $ffmpeg -ArgumentList "-f lavfi -i sine=frequency=440:duration=120 -ar 48000 -ac 2 `"$wav`" -y" -Wait -NoNewWindow
          
          if (Test-Path $wav) {
            # Start a background PowerShell process using System.Media.SoundPlayer.
            # Unlike WMPlayer or ffplay, SoundPlayer uses the low-level PlaySound API 
            # which works flawlessly in headless environments without requiring a message pump.
            $psCommand = "`$player = New-Object System.Media.SoundPlayer; `$player.SoundLocation = `'$wav`'; `$player.PlayLooping(); Start-Sleep -Seconds 120"
            Start-Process -FilePath "powershell.exe" -ArgumentList "-WindowStyle Hidden -Command `"$psCommand`""
            Write-Host "Sine wave playback started via System.Media.SoundPlayer"
          } else {
            Write-Warning "ffmpeg WAV generation failed -- audio capture tests may time out"
          }
          # Give PowerShell a couple seconds to spin up the background process
          Start-Sleep -Seconds 3

      - name: Run tests
        shell: powershell
        env:
          VIRTUAL_AUDIO_READY: "1"
        run: npm test

  # ───────────────────────────────────────────────────────────────────────────
  # MACOS — ScreenCaptureKit capture test
  # macOS 14 (Sonoma) runners have a CoreAudio null device available.
  # ScreenCaptureKit does NOT require a physical mic/speaker for process loopback.
  # ───────────────────────────────────────────────────────────────────────────
  test-macos:
    runs-on: macos-14  # Apple Silicon — macOS 14 Sonoma (ScreenCaptureKit 13+)
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build native module
        run: npm run build

      - name: Enable built-in macOS null audio device
        run: |
          # The "BlackHole" virtual audio driver or the built-in CoreAudio null device
          # allows ScreenCaptureKit to initialise without a physical speaker.
          # Install BlackHole-2ch via Homebrew (no UI dialogs, no SIP bypass required).
          brew install blackhole-2ch || true
          # Allow a moment for the audio server to pick up the new device
          sleep 3
          # Verify: list CoreAudio devices
          system_profiler SPAudioDataType | grep -i "blackhole\|null\|virtual" || \
            echo "No virtual device found — SCK capture tests will be gracefully skipped"

      - name: Run tests
        # ScreenCaptureKit on macOS can capture process audio without a physical device
        # if a virtual device exists; we set the flag conservatively.
        env:
          VIRTUAL_AUDIO_READY: "1"
        run: npm test

  # ───────────────────────────────────────────────────────────────────────────
  # LINUX — PipeWire capture test with virtual sink
  # ───────────────────────────────────────────────────────────────────────────
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PipeWire, WirePlumber, and virtual sink tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libpipewire-0.3-dev \
            libx11-dev \
            pipewire \
            pipewire-audio-client-libraries \
            wireplumber \
            gstreamer1.0-pipewire \
            ffmpeg \
            pulseaudio-utils

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build native module
        run: npm run build

      - name: Start PipeWire daemon and virtual null sink
        # XDG_RUNTIME_DIR MUST be exported before pipewire starts so the daemon
        # creates its socket at the same path the client will look for it.
        # Without this, pw_context_connect() returns -3 (ENOENT — socket not found).
        run: |
          export XDG_RUNTIME_DIR=/tmp/pipewire-runtime
          mkdir -p $XDG_RUNTIME_DIR

          # Launch PipeWire daemon (headless — no physical hardware needed)
          pipewire &
          sleep 2

          # Verify the socket exists before proceeding
          if [ ! -S "$XDG_RUNTIME_DIR/pipewire-0" ]; then
            echo "ERROR: PipeWire socket not found at $XDG_RUNTIME_DIR/pipewire-0"
            ls -la $XDG_RUNTIME_DIR || true
            exit 1
          fi
          echo "PipeWire socket ready: $XDG_RUNTIME_DIR/pipewire-0"

          # pw-loopback creates a capture source backed by a null sink —
          # this is the correct way to get a readable audio stream without hardware.
          PIPEWIRE_REMOTE=$XDG_RUNTIME_DIR/pipewire-0 \
            pw-loopback --capture-props='media.class=Audio/Source node.name=null-source' &
          sleep 1

          # Feed a 440 Hz sine wave to PipeWire's default sink for 60 s
          # (covers the full Jest run including timeouts)
          PIPEWIRE_REMOTE=$XDG_RUNTIME_DIR/pipewire-0 \
            ffmpeg -f lavfi -i sine=frequency=440:duration=60 \
              -f au - | pw-play - &
          echo "Sine wave playback started"

      - name: Run tests
        env:
          VIRTUAL_AUDIO_READY: "1"
          XDG_RUNTIME_DIR: /tmp/pipewire-runtime
          PIPEWIRE_REMOTE: /tmp/pipewire-runtime/pipewire-0
        run: npm test

  # ───────────────────────────────────────────────────────────────────────────
  # LINUX NO-X11 — Tests with PulseAudio null sink, no X11 dependency.
  #
  # Purpose: verify audio capture works in a headless environment that has
  # PipeWire available (via libpipewire-0.3-dev) but no X11/display server.
  # This mirrors server deployments and CI environments where a display is
  # unavailable. getPidFromWindowHandle() gracefully returns 0.
  #
  # Audio backend: PulseAudio null sink, which PipeWire discovers via the
  # pipewire-pulse compatibility layer (pre-installed on ubuntu-22.04+).
  # ───────────────────────────────────────────────────────────────────────────
  test-linux-no-deps:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PipeWire dev headers (compile only, no X11)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libpipewire-0.3-dev \
            pipewire \
            pipewire-pulse \
            ffmpeg
          # libx11-dev is intentionally omitted: we test without X11 support.
          # The build system detects HAVE_X11 via pkg-config; without libx11-dev
          # it compiles without X11, so getPidFromWindowHandle() always returns 0.

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies and build (no X11)
        run: npm install

      - name: Start PulseAudio null sink
        run: |
          export XDG_RUNTIME_DIR=/tmp/pw-nodeps
          mkdir -p $XDG_RUNTIME_DIR
          # Start PulseAudio in daemon mode with a null (virtual) output sink.
          # On ubuntu-22.04 pipewire-pulse bridges PulseAudio sessions to PipeWire,
          # so our PipeWire-based module can enumerate and capture from this sink.
          pulseaudio --daemonize=true \
            --exit-idle-time=-1 \
            --load="module-null-sink sink_name=NullSink" \
            --log-target=file:/tmp/pw-nodeps/pulseaudio.log 2>/dev/null || true
          sleep 2

          # Also start PipeWire daemon so our native module can connect.
          pipewire &
          sleep 2

          if [ -S "$XDG_RUNTIME_DIR/pipewire-0" ]; then
            echo "PipeWire socket ready: $XDG_RUNTIME_DIR/pipewire-0"
          else
            # Fallback: check default XDG path
            echo "PipeWire socket not at custom path, checking defaults..."
            ls /run/user/ 2>/dev/null || true
          fi

          # Feed 440 Hz sine into PulseAudio null sink for 60 s
          ffmpeg -f lavfi -i sine=frequency=440:duration=60 \
            -f pulse "NullSink" 2>/dev/null &
          echo "Sine wave playback started into NullSink"

      - name: Run tests (no X11, with audio)
        env:
          VIRTUAL_AUDIO_READY: "1"
          XDG_RUNTIME_DIR: /tmp/pw-nodeps
          PIPEWIRE_REMOTE: /tmp/pw-nodeps/pipewire-0
        run: npm test
